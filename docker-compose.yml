services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: mytechpulse
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-rootpass}"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - ./backend/.env
    environment:
      # DATABASE_URL は host を db に上書き（backend/.env の localhost 版より優先される）
      DATABASE_URL: "mysql+pymysql://root:${MYSQL_ROOT_PASSWORD:-rootpass}@db:3306/mytechpulse"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  # ---- 任意（案B）: 静的フロント配信。`docker compose --profile frontend up` で有効化 ----
  # 使う場合は js/main.js の API_BASE_URL と backend/app/main.py の CORS 調整が必要
  # frontend:
  #   image: nginx:alpine
  #   profiles: ["frontend"]
  #   ports:
  #     - "8080:80"
  #   volumes:
  #     - ./html:/usr/share/nginx/html/html:ro
  #     - ./css:/usr/share/nginx/html/css:ro
  #     - ./js:/usr/share/nginx/html/js:ro
  #     - ./img:/usr/share/nginx/html/img:ro
  #   depends_on:
  #     - api

volumes:
  db_data:
